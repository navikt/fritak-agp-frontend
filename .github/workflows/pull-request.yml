name: Bygg pull request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

env:
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NPM_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
  NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

jobs:
  Bygg:
    name: Bygger uten å laste opp for å sjekke at det bygger
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://npm.pkg.github.com"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high 2>&1 | tee audit-output.txt || true

      - name: Upload audit output artifact
        uses: actions/upload-artifact@v7
        with:
          name: audit-output
          path: audit-output.txt

      - name: Post audit results as PR comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const auditOutput = fs.readFileSync('audit-output.txt', 'utf8');
            const maxCommentLength = 60000;
            const maxPreviewLines = 200;
            const lines = auditOutput.split('\n');
            const summaryLines = [];
            for (const line of lines) {
              if (!line.trim()) {
                if (summaryLines.length > 0) {
                  break;
                }
                continue;
              }
              summaryLines.push(line);
            }
            const previewLines = lines.slice(0, maxPreviewLines).join('\n');
            const header = '## pnpm audit\n';
            const artifactNote = '\n\nFull output is available in the `audit-output` workflow artifact (`audit-output.txt`).';
            let content = previewLines;
            if (summaryLines.length > 0 && summaryLines.join('\n') !== previewLines) {
              content = `${summaryLines.join('\n')}\n\n${previewLines}`;
            }
            let body = `${header}\`\`\`\n${content}\n\`\`\`${artifactNote}`;
            if (body.length > maxCommentLength) {
              const availableContentLength = maxCommentLength - header.length - artifactNote.length - '\n```\n\n```'.length - 32;
              const truncatedContent = content.slice(0, Math.max(0, availableContentLength));
              body = `${header}\`\`\`\n${truncatedContent}\n\`\`\`\n\nOutput truncated to fit GitHub comment limits.${artifactNote}`;
            } else if (lines.length > maxPreviewLines) {
              body = `${header}\`\`\`\n${content}\n\`\`\`\n\nOutput truncated to the first ${maxPreviewLines} lines.${artifactNote}`;
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## pnpm audit'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint
